<div class="login">
  <form class="login-box" (ngSubmit)="realizarLogin()">
    <h2>Login</h2>

    <div class="input-group">
      <label for="email">E-mail</label>
      <input 
        type="email" 
        id="email" 
        name="email"
        [(ngModel)]="email"
        placeholder="Digite seu e-mail" 
        required>
    </div>

    <div class="input-group">
      <label for="senha">Senha</label>
      <input 
        type="password" 
        id="senha" 
        name="senha"
        [(ngModel)]="senha"
        placeholder="Digite sua senha" 
        required>
    </div>

    <button type="submit">Entrar</button>

    <p class="link">
      Não tem conta? <a routerLink="/cadastrar-usuario">Cadastre-se</a>
    </p>
  </form>
</div>
