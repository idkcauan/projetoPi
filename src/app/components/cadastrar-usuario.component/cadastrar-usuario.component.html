<div class="login">
    <form class="login-box", (ngSubmit)="cadastroDeUsuario()">
        <h2>Cadastro</h2>
        <div class="input-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" [(ngModel)]="nome" placeholder="Digite seu nome" required>
        </div>
        <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="e-mail" [(ngModel)]="email" placeholder="Digite seu e-mail" required>
        </div>
        <div class="input-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha-1" [(ngModel)]="senha" placeholder="Crie uma senha" required>
        </div>
        <div class="input-group">
            <label for="confirmar">Confirmar Senha</label>
            <input type="password" id="confirmar" name="senha-2" [(ngModel)]="senha2" placeholder="Confirme sua senha" required>
        </div>
        <button type="submit">Cadastrar</button>

        <p class="link">
            Já tem conta? <a routerLink="/login">Fazer login</a>
        </p>
    </form>
</div>
